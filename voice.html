<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>語音辨識</title>

<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    padding: 30px;
    background: #121212;
    color: white;
}

h2 {
    color: #facc15;
}

/* 卡片 */
.card {
    margin: 15px auto;
    padding: 20px;
    border-radius: 16px;
    width: 90%;
    max-width: 500px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.4);
}

.target-card { background: #1e293b; }
.result-card { background: #1f2937; }

.target-label {
    font-size: 14px;
    color: #9ca3af;
}

.target-text {
    font-size: 26px;
    font-weight: bold;
    margin-top: 10px;
}

#status {
    margin-top: 15px;
    font-size: 18px;
    color: #ccc;
}

#result {
    margin-top: 10px;
    font-size: 26px;
    min-height: 40px;
}

/* 按鈕 */
button {
    margin-top: 20px;
    padding: 15px 25px;
    font-size: 18px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(45deg, #ef4444, #f97316);
    color: white;
    cursor: pointer;
}

button:hover {
    transform: scale(1.05);
}
</style>
</head>

<body>

<h2>🎤 語音辨識</h2>

<div class="card target-card">
    <div id="targetText"></div>
</div>

<div id="status">請按下按鈕開始說話</div>

<div class="card result-card">
    <div id="result"></div>
</div>

<button onclick="start()">🎤 開始錄音</button>

<script>

/* =========================
   防白屏
========================= */
window.onerror = function(msg, src, line){
    document.body.innerHTML =
        "<h2>❌ 發生錯誤</h2>" +
        "<pre>" + msg + "</pre>" +
        "<p>Line: " + line + "</p>";
};

/* =========================
   取得 target
========================= */
const params = new URLSearchParams(window.location.search);
const target = params.get("target") || "";

function normalize(str){
    return str
        .toLowerCase()
        .replace(/[^\w\s]/g,"")
        .replace(/\s+/g," ")
        .trim();
}

/* 顯示句子 */
window.onload = function(){
    document.getElementById("targetText").innerHTML =
        "<div class='target-label'>請朗讀：</div>" +
        "<div class='target-text'>" + target + "</div>";
};

/* =========================
   相似度
========================= */
function similarity(a, b){
    let same = 0;
    let len = Math.max(a.length, b.length);

    for(let i=0;i<Math.min(a.length,b.length);i++){
        if(a[i]===b[i]) same++;
    }

    return same / len;
}

/* =========================
   ⭐ 句子修正（重點）
========================= */
function fixSentence(spoken, target){

    let sWords = normalize(spoken).split(" ");
    let tWords = normalize(target).split(" ");

    let result = [];

    tWords.forEach(t => {

        let best = "";
        let bestScore = 0;

        sWords.forEach(s => {

            let score = 0;

            if (s === t) score = 1;
            else score = similarity(s, t);

            if (score > bestScore) {
                bestScore = score;
                best = s;
            }
        });

        // ⭐ 如果有接近 → 用 target
        if (bestScore > 0.5) {
            result.push(t);
        } else {
            result.push(best || "");
        }

    });

    return result.join(" ");
}

/* =========================
   🎤 語音
========================= */
function start(){

    const SpeechRecognition =
        window.SpeechRecognition || window.webkitSpeechRecognition;

    if (!SpeechRecognition) {
        document.getElementById("status").innerText =
            "❌ 不支援語音辨識";
        return;
    }

    let recognition = new SpeechRecognition();
    recognition.lang = "en-US";
    recognition.continuous = false;
    recognition.interimResults = false;

    recognition.onstart = function(){
        document.getElementById("status").innerText = "🎤 正在聽...";
    };

    recognition.onresult = function(event){

        let raw = event.results[0][0].transcript;

        // ⭐ 修正句子
        let fixed = fixSentence(raw, target);

        document.getElementById("result").innerHTML =
            "<div style='font-size:14px;color:#9ca3af'>你說的是：</div>" +
            "<div style='margin-top:8px;font-weight:bold'>" + fixed + "</div>";

        document.getElementById("status").innerText = "完成 ✔";

        // ⭐ 回主頁
        if (window.opener) {
            window.opener.postMessage({
                spoken: fixed,
                raw: raw,
                target: target
            }, "*");
        }

        setTimeout(()=>{
            window.close();
        }, 800);
    };

    recognition.onerror = function(){
        document.getElementById("status").innerText =
            "❌ 錄音失敗";
    };

    recognition.start();
}

</script>

</body>
</html>
