<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>語音辨識</title>

<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    padding: 30px;
    background: #121212;
    color: white;
}

h2 {
    color: #facc15;
}

/* 卡片 */
.card {
    margin: 15px auto;
    padding: 20px;
    border-radius: 16px;
    width: 90%;
    max-width: 500px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.4);
}

.target-card {
    background: #1e293b;
}

.result-card {
    background: #1f2937;
}

.target-label {
    font-size: 14px;
    color: #9ca3af;
}

.target-text {
    font-size: 26px;
    font-weight: bold;
    margin-top: 10px;
}

#status {
    margin-top: 15px;
    font-size: 18px;
    color: #ccc;
}

#result {
    margin-top: 10px;
    font-size: 26px;
    min-height: 40px;
}

/* 按鈕 */
button {
    margin-top: 20px;
    padding: 15px 25px;
    font-size: 18px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(45deg, #ef4444, #f97316);
    color: white;
    cursor: pointer;
}

button:hover {
    transform: scale(1.05);
}
</style>
</head>

<body>

<h2>🎤 語音辨識</h2>

<!-- 要朗讀的句子 -->
<div class="card target-card">
    <div id="targetText"></div>
</div>

<button onclick="start()">
🎤 開始錄音
</button>

<div id="status">
請按下按鈕開始說話
</div>

<!-- 辨識結果 -->
<div class="card result-card">
    <div id="result"></div>
</div>

<script>

/* =========================
   防白屏
========================= */
window.onerror = function(msg, src, line){

    document.body.innerHTML =
        "<h2>❌ 發生錯誤</h2>" +
        "<pre>" + msg + "</pre>" +
        "<p>Line: " + line + "</p>";
};

/* =========================
   取得 target
========================= */
const params = new URLSearchParams(window.location.search);

const target = params.get("target") || "";

/* =========================
   顯示 target
========================= */
window.onload = function(){

    document.getElementById("targetText").innerHTML =
        "<div class='target-label'>請朗讀：</div>" +
        "<div class='target-text'>" + target + "</div>";
};

/* =========================
   正規化
========================= */
function normalize(str){

    return str
        .toLowerCase()
        .replace(/[^\w\s]/g,"")
        .replace(/\s+/g," ")
        .trim();
}

/* =========================
   編輯距離
========================= */
function levenshtein(a, b){

    const matrix = [];

    for(let i = 0; i <= b.length; i++){
        matrix[i] = [i];
    }

    for(let j = 0; j <= a.length; j++){
        matrix[0][j] = j;
    }

    for(let i = 1; i <= b.length; i++){

        for(let j = 1; j <= a.length; j++){

            if(b.charAt(i - 1) === a.charAt(j - 1)){

                matrix[i][j] = matrix[i - 1][j - 1];

            }else{

                matrix[i][j] = Math.min(
                    matrix[i - 1][j - 1] + 1,
                    matrix[i][j - 1] + 1,
                    matrix[i - 1][j] + 1
                );
            }
        }
    }

    return matrix[b.length][a.length];
}

/* =========================
   單字容錯判定
========================= */
function shouldFixWord(rawWord, targetWord){

    rawWord = normalize(rawWord);

    targetWord = normalize(targetWord);

    // 完全相同
    if(rawWord === targetWord){
        return true;
    }

    // 開頭相同
    let sameStart =
        rawWord.charAt(0) === targetWord.charAt(0);

    // 長度接近
    let lenClose =
        Math.abs(rawWord.length - targetWord.length) <= 2;

    // 編輯距離
    let distance =
        levenshtein(rawWord, targetWord);

    // know -> no 類型
    let specialSoundLike =
        (
            targetWord.includes(rawWord) ||
            rawWord.includes(targetWord)
        ) &&
        sameStart;

    // 判定
    if(
        (
            sameStart &&
            lenClose &&
            distance <= 2
        )
        ||
        specialSoundLike
    ){
        return true;
    }

    return false;
}

/* =========================
   語音辨識
========================= */
function start(){

    const SpeechRecognition =
        window.SpeechRecognition ||
        window.webkitSpeechRecognition;

    if (!SpeechRecognition) {

        document.getElementById("status").innerText =
            "❌ 此裝置不支援語音辨識";

        return;
    }

    let recognition = new SpeechRecognition();

    recognition.lang = "en-US";

    recognition.continuous = false;

    recognition.interimResults = false;

    /* 開始錄音 */
    recognition.onstart = function(){

        document.getElementById("status").innerText =
            "🎤 正在聽...";
    };

    /* 辨識成功 */
    recognition.onresult = function(event){

        let raw =
            event.results[0][0].transcript;

        let confidence =
            event.results[0][0].confidence;

        let finalText = raw;

        let rawWords =
            normalize(raw).split(/\s+/);

        let targetWords =
            normalize(target).split(/\s+/);

        /* =========================
           單字修正
        ========================= */
        if(
            rawWords.length === 1 &&
            targetWords.length === 1
        ){

            if(
                shouldFixWord(
                    rawWords[0],
                    targetWords[0]
                )
            ){

                // confidence太低才修正
                if(confidence < 0.95){

                    finalText = target;
                }
            }
        }

        /* 顯示結果 */
        document.getElementById("result").innerHTML =

            "<div style='font-size:14px;color:#9ca3af'>你說的是：</div>" +

            "<div style='margin-top:10px;font-weight:bold'>" +

            finalText +

            "</div>";

        document.getElementById("status").innerText =
            "完成 ✔";

        /* 回主頁 */
        if(window.opener){

            window.opener.postMessage({

                spoken: finalText,

                raw: raw,

                target: target

            }, "*");
        }

        /* 關閉視窗 */
        setTimeout(function(){

            window.close();

        }, 800);
    };

    /* 錯誤 */
    recognition.onerror = function(event){

        document.getElementById("status").innerText =

            "❌ 錄音失敗：" + event.error;
    };

    /* 啟動 */
    try{

        recognition.start();

    }catch(e){

        document.getElementById("status").innerText =

            "❌ 啟動失敗：" + e.message;
    }
}

</script>

</body>
</html>
