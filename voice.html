<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>語音辨識</title>

<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    padding: 30px;
    background: #121212;
    color: white;
}

h2 {
    color: #facc15;
}

/* 卡片 */
.card {
    margin: 15px auto;
    padding: 20px;
    border-radius: 16px;
    width: 90%;
    max-width: 700px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.4);
}

.target-card {
    background: #1e293b;
}

.result-card {
    background: #1f2937;
}

/* 標籤 */
.target-label {
    font-size: 14px;
    color: #9ca3af;
}

/* 題目 */
.target-text {
    font-size: 28px;
    font-weight: bold;
    margin-top: 10px;
    line-height: 1.6;
}

/* 狀態 */
#status {
    margin-top: 15px;
    font-size: 18px;
    color: #ccc;
}

/* 辨識結果 */
#result {
    margin-top: 10px;
    min-height: 50px;
}

/* 麥克風按鈕 */
#micBtn{

    margin-top: 25px;

    width: 100px;
    height: 100px;

    border-radius: 50%;
    border: none;

    font-size: 48px;

    display:flex;
    justify-content:center;
    align-items:center;

    line-height:1;

    background: linear-gradient(45deg,#ef4444,#f97316);

    color: white;

    cursor: pointer;

    transition: 0.2s;

    margin-left:auto;
    margin-right:auto;
}

#micBtn:hover{
    transform: scale(1.08);
}
</style>
</head>

<body>

<h2>🎤 語音辨識</h2>

<!-- 題目 -->
<div class="card target-card">

    <div class="target-label">
        請朗讀：
    </div>

    <div id="targetText" class="target-text">
    </div>

</div>

<!-- 狀態 -->
<div id="status">
請按下麥克風開始錄音
</div>

<!-- 辨識結果 -->
<div class="card result-card">

    <div id="result"></div>

</div>

<!-- 麥克風 -->
<button id="micBtn" onclick="start()">
🎤
</button>

<script>

/* =========================
   防白屏
========================= */
window.onerror = function(msg, src, line){

    document.body.innerHTML =

        "<h2>❌ 發生錯誤</h2>" +

        "<pre>" + msg + "</pre>" +

        "<p>Line: " + line + "</p>";
};

/* =========================
   取得 target
========================= */
const params = new URLSearchParams(window.location.search);

const target = params.get("target") || "";

/* =========================
   顯示 target
========================= */
window.onload = function(){

    document.getElementById("targetText").innerText =
        target;
};

/* =========================
   正規化
========================= */
function normalize(str){

    return str
        .toLowerCase()
        .replace(/-/g," ")
        .replace(/[^\w\s]/g,"")
        .replace(/\s+/g," ")
        .trim();
}

/* =========================
   同音 / 相似字
========================= */
function isSimilarWord(a,b){

    a = normalize(a);
    b = normalize(b);

    if(a === b) return true;

    const homophones = {

        "know": ["no"],
        "no": ["know"],

        "write": ["right"],
        "right": ["write"],

        "meat": ["meet"],
        "meet": ["meat"],

        "sea": ["see"],
        "see": ["sea"],

        "here": ["hear"],
        "hear": ["here"],

        "to": ["too","two"],
        "too": ["to","two"],
        "two": ["to","too"],

        "flower": ["flour"],
        "flour": ["flower"],

        "bye": ["by","buy"],
        "buy": ["bye","by"],
        "by": ["buy","bye"]
    };

    if(
        homophones[a] &&
        homophones[a].includes(b)
    ){
        return true;
    }

    return false;
}

/* =========================
   語音辨識
========================= */
function start(){

    const SpeechRecognition =

        window.SpeechRecognition ||
        window.webkitSpeechRecognition;

    if (!SpeechRecognition) {

        document.getElementById("status").innerText =

            "❌ 此裝置不支援語音辨識";

        return;
    }

    let recognition = new SpeechRecognition();

    recognition.lang = "en-US";

    recognition.continuous = false;

    recognition.interimResults = false;

    /* 開始 */
    recognition.onstart = function(){

        document.getElementById("status").innerText =

            "🎤 正在聽...";
    };

    /* 成功 */
    recognition.onresult = function(event){

        let rawText =
            event.results[0][0].transcript;

        let finalText = rawText;

        /* =========================
           ⭐ 單字模式修正
           只有 target 是單字才修正
        ========================= */

        let targetWords =
            normalize(target).split(/\s+/);

        let spokenWords =
            normalize(rawText).split(/\s+/);

        if(
            targetWords.length === 1 &&
            spokenWords.length <= 2
        ){

            if(
                isSimilarWord(
                    spokenWords[0],
                    targetWords[0]
                )
            ){
                finalText = target;
            }
        }

        /* 顯示辨識結果 */
        document.getElementById("result").innerHTML =

            "<div style='font-size:14px;color:#9ca3af;'>你說的是：</div>" +

            "<div style='font-size:32px;font-weight:bold;margin-top:12px;line-height:1.6;'>" +

            finalText +

            "</div>";

        document.getElementById("status").innerText =

            "完成 ✔";

        /* 回主頁 */
        if(window.opener){

            window.opener.postMessage({

                spoken: finalText,
                raw: rawText,
                target: target

            }, "*");
        }

        /* 關閉視窗 */
        setTimeout(function(){

            window.close();

        }, 800);
    };

    /* 失敗 */
    recognition.onerror = function(event){

        document.getElementById("status").innerText =

            "❌ 錄音失敗：" + event.error;
    };

    /* 啟動 */
    try{

        recognition.start();

    }catch(e){

        document.getElementById("status").innerText =

            "❌ 啟動失敗：" + e.message;
    }
}

</script>

</body>
</html>
