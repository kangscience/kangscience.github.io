<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>Voice Page</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    padding: 30px;
    background: #f4f4f4;
}

h2 {
    margin-bottom: 20px;
}

#status {
    font-size: 20px;
    margin-top: 20px;
    color: #333;
}

#result {
    margin-top: 20px;
    font-size: 22px;
    background: white;
    padding: 15px;
    border-radius: 10px;
    min-height: 60px;
}

button {
    padding: 12px 20px;
    font-size: 18px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    margin-top: 20px;
    background: #4CAF50;
    color: white;
}
</style>
</head>

<body>

<h2>🎤 語音辨識</h2>

<div id="status">請按下按鈕開始說話</div>
<div id="result"></div>

<button onclick="start()">🎤 開始錄音</button>

<script>

/* =========================
   防白屏錯誤偵測
========================= */
window.onerror = function(msg, src, line, col, err){
    document.body.innerHTML =
        "<h2>❌ 發生錯誤</h2>" +
        "<pre>" + msg + "</pre>" +
        "<p>Line: " + line + "</p>";
};

/* =========================
   取得主頁參數
========================= */
const params = new URLSearchParams(window.location.search);
const target = params.get("target") || "";

/* =========================
   語音主程式
========================= */
function start(){

    const SpeechRecognition =
        window.SpeechRecognition || window.webkitSpeechRecognition;

    if (!SpeechRecognition) {
        document.getElementById("status").innerText =
            "❌ 此裝置不支援語音辨識";
        return;
    }

    let recognition = new SpeechRecognition();
    recognition.lang = "en-US";
    recognition.continuous = false;
    recognition.interimResults = false;

    recognition.onstart = function(){
        document.getElementById("status").innerText = "🎤 正在聽...";
    };

    recognition.onresult = function(event){

    let text = event.results[0][0].transcript;

    document.getElementById("result").innerHTML =
        "你說：<br><b>" + text + "</b>";

    document.getElementById("status").innerText = "完成 ✔";

    // ⭐ 把資料傳回主頁（關鍵）
    if (window.opener) {
        window.opener.postMessage({
            spoken: text,
            target: target
        }, "*");
    }

    // ⭐ 關閉語音頁
    setTimeout(function(){
        window.close();
    }, 500);
};

    try {
        recognition.start();
    } catch (e) {
        document.getElementById("status").innerText =
            "❌ 啟動失敗：" + e.message;
    }
}

</script>

</body>
</html>
