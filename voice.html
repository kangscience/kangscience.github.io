<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>語音辨識</title>

<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    padding: 30px;
    background: #121212;
    color: white;
}

h2 {
    color: #facc15;
}

.card {
    margin: 15px auto;
    padding: 20px;
    border-radius: 16px;
    width: 90%;
    max-width: 500px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.4);
}

.target-card { background: #1e293b; }
.result-card { background: #1f2937; }

.target-label {
    font-size: 14px;
    color: #9ca3af;
}

.target-text {
    font-size: 26px;
    font-weight: bold;
    margin-top: 10px;
}

#status {
    margin-top: 15px;
    font-size: 18px;
    color: #ccc;
}

#result {
    margin-top: 10px;
    font-size: 22px;
    min-height: 40px;
}

button {
    margin-top: 20px;
    padding: 15px 25px;
    font-size: 18px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(45deg, #ef4444, #f97316);
    color: white;
    cursor: pointer;
}

button:hover {
    transform: scale(1.05);
}
</style>
</head>

<body>

<h2>🎤 語音辨識</h2>

<!-- 顯示句子 -->
<div class="card target-card">
    <div id="targetText"></div>
</div>

<div id="status">請按下按鈕開始說話</div>

<div class="card result-card">
    <div id="result"></div>
</div>

<button onclick="start()">🎤 開始錄音</button>

<script>

/* =========================
   防白屏錯誤
========================= */
window.onerror = function(msg, src, line){
    document.body.innerHTML =
        "<h2>❌ 發生錯誤</h2>" +
        "<pre>" + msg + "</pre>" +
        "<p>Line: " + line + "</p>";
};

/* =========================
   取得參數
========================= */
const params = new URLSearchParams(window.location.search);
const target = params.get("target") || "";

/* =========================
   顯示句子
========================= */
window.addEventListener("DOMContentLoaded", function(){

    console.log("target =", target);

    const el = document.getElementById("targetText");

    if(!target){
        el.innerHTML = "<span style='color:red'>⚠ 沒收到句子</span>";
        return;
    }

    el.innerHTML =
        "<div class='target-label'>請朗讀：</div>" +
        "<div class='target-text'>" + target + "</div>";
});

/* =========================
   Soundex（發音比對）
========================= */
function soundex(s) {
    if (!s) return "";
    const a = s.toLowerCase().split('');
    const f = a.shift();

    const codes = {
        a: '', e: '', i: '', o: '', u: '',
        b: 1, f: 1, p: 1, v: 1,
        c: 2, g: 2, j: 2, k: 2, q: 2, s: 2, x: 2, z: 2,
        d: 3, t: 3,
        l: 4,
        m: 5, n: 5,
        r: 6
    };

    let output = f;
    let prev = codes[f];

    for (let i = 0; i < a.length; i++) {
        let code = codes[a[i]];
        if (code !== prev) {
            if (code !== '') output += code;
        }
        prev = code;
    }

    return (output + "000").slice(0,4);
}

/* =========================
   相似度
========================= */
function similarity(a, b) {
    if (!a || !b) return 0;

    let same = 0;
    let len = Math.max(a.length, b.length);

    for (let i = 0; i < Math.min(a.length, b.length); i++) {
        if (a[i] === b[i]) same++;
    }

    return same / len;
}

/* =========================
   語音辨識
========================= */
function start(){

    const SpeechRecognition =
        window.SpeechRecognition || window.webkitSpeechRecognition;

    if (!SpeechRecognition) {
        document.getElementById("status").innerText =
            "❌ 此裝置不支援語音辨識";
        return;
    }

    let recognition = new SpeechRecognition();
    recognition.lang = "en-US";
    recognition.continuous = false;
    recognition.interimResults = false;

    recognition.onstart = function(){
        document.getElementById("status").innerText = "🎤 正在聽...";
    };

    recognition.onresult = function(event){

        let text = event.results[0][0].transcript;

        document.getElementById("result").innerHTML =
            "你說：<br><b>" + text + "</b>";

        document.getElementById("status").innerText = "完成 ✔";

        /* ⭐ 回主頁 */
        if (window.opener) {
            window.opener.postMessage({
                spoken: text,
                target: target
            }, "*");
        }

        /* ⭐ 關閉 */
        setTimeout(function(){
            window.close();
        }, 800);
    };

    recognition.onerror = function(){
        document.getElementById("status").innerText =
            "❌ 錄音失敗";
    };

    try {
        recognition.start();
    } catch (e) {
        document.getElementById("status").innerText =
            "❌ 啟動失敗：" + e.message;
    }
}

</script>

</body>
</html>
