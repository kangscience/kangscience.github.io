<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>語音辨識</title>

<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    padding: 30px;
    background: #121212;
    color: white;
}

/* 標題 */
h2 {
    color: #facc15;
}

/* 卡片 */
.card {
    margin: 15px auto;
    padding: 20px;
    border-radius: 16px;
    width: 90%;
    max-width: 500px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.4);
}

/* 區塊 */
.target-card { background: #1e293b; }
.result-card { background: #1f2937; }

/* 朗讀句子 */
.target-label {
    font-size: 14px;
    color: #9ca3af;
}

.target-text {
    font-size: 26px;
    font-weight: bold;
    margin-top: 10px;
}

/* 狀態 */
#status {
    margin-top: 15px;
    font-size: 18px;
    color: #ccc;
}

/* 辨識結果 */
#result {
    margin-top: 10px;
    font-size: 24px;
    min-height: 40px;
}

/* 按鈕 */
button {
    margin-top: 20px;
    padding: 15px 25px;
    font-size: 18px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(45deg, #ef4444, #f97316);
    color: white;
    cursor: pointer;
}

button:hover {
    transform: scale(1.05);
}
</style>
</head>

<body>

<h2>🎤 語音辨識</h2>

<!-- 要朗讀的句子 -->
<div class="card target-card">
    <div id="targetText"></div>
</div>

<div id="status">請按下按鈕開始說話</div>

<!-- 辨識結果 -->
<div class="card result-card">
    <div id="result"></div>
</div>

<button onclick="start()">🎤 開始錄音</button>

<script>

/* =========================
   防白屏錯誤
========================= */
window.onerror = function(msg, src, line){
    document.body.innerHTML =
        "<h2>❌ 發生錯誤</h2>" +
        "<pre>" + msg + "</pre>" +
        "<p>Line: " + line + "</p>";
};

/* =========================
   取得主頁傳來的句子
========================= */
const params = new URLSearchParams(window.location.search);
const target = params.get("target") || "";

/* 顯示 target */
window.onload = function(){
    document.getElementById("targetText").innerHTML =
        "<div class='target-label'>請朗讀：</div>" +
        "<div class='target-text'>" + target + "</div>";
};

/* =========================
   🔤 Soundex（發音比對）
========================= */
function soundex(s) {
    if (!s) return "";

    const map = {
        B:1,F:1,P:1,V:1,
        C:2,G:2,J:2,K:2,Q:2,S:2,X:2,Z:2,
        D:3,T:3,
        L:4,
        M:5,N:5,
        R:6
    };

    s = s.toUpperCase().replace(/[^A-Z]/g, "");

    if (!s) return "";

    let first = s[0];
    let result = first;
    let prev = map[first] || 0;

    for (let i = 1; i < s.length; i++) {
        let code = map[s[i]] || 0;
        if (code !== prev && code !== 0) {
            result += code;
        }
        prev = code;
    }

    return (result + "000").slice(0,4);
}

/* =========================
   🔤 字母相似度
========================= */
function similarity(a, b) {
    if (!a || !b) return 0;

    let same = 0;
    let len = Math.max(a.length, b.length);

    for (let i = 0; i < Math.min(a.length, b.length); i++) {
        if (a[i] === b[i]) same++;
    }

    return same / len;
}

/* =========================
   🧠 修正句子（核心）
========================= */
function fixSentence(spoken, target){

    let spokenWords = spoken.toLowerCase().split(/\s+/);
    let targetWords = target.toLowerCase().split(/\s+/);

    let fixed = [];

    for(let i=0;i<targetWords.length;i++){

        let s = spokenWords[i] || "";
        let t = targetWords[i];

        if (s === t) {
            fixed.push(t);
        }
        else if (
            soundex(s) === soundex(t) ||
            similarity(s, t) > 0.5 ||
            (s.length <= 3 && t.length <= 5)
        ){
            fixed.push(t);
        }
        else {
            fixed.push(s);
        }
    }

    return fixed.join(" ");
}

/* =========================
   🎤 語音辨識
========================= */
function start(){

    const SpeechRecognition =
        window.SpeechRecognition || window.webkitSpeechRecognition;

    if (!SpeechRecognition) {
        document.getElementById("status").innerText =
            "❌ 此裝置不支援語音辨識";
        return;
    }

    let recognition = new SpeechRecognition();
    recognition.lang = "en-US";
    recognition.continuous = false;
    recognition.interimResults = false;

    recognition.onstart = function(){
        document.getElementById("status").innerText = "🎤 正在聽...";
    };

    recognition.onresult = function(event){

        let raw = event.results[0][0].transcript;

        // ⭐ 修正
        let fixed = fixSentence(raw, target);

        document.getElementById("result").innerHTML =
            "你說：<br><b>" + fixed + "</b>";

        document.getElementById("status").innerText = "完成 ✔";

        /* ⭐ 回主頁 */
        if (window.opener) {
            window.opener.postMessage({
                spoken: fixed,
                raw: raw,
                target: target
            }, "*");
        }

        /* ⭐ 關閉視窗 */
        setTimeout(function(){
            window.close();
        }, 800);
    };

    recognition.onerror = function(){
        document.getElementById("status").innerText =
            "❌ 錄音失敗";
    };

    try {
        recognition.start();
    } catch (e) {
        document.getElementById("status").innerText =
            "❌ 啟動失敗：" + e.message;
    }
}

</script>

</body>
</html>
