<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>語音辨識</title>

<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    padding: 30px;
    background: #121212;
    color: white;
}

h2 {
    color: #facc15;
}

.card {
    margin: 15px auto;
    padding: 20px;
    border-radius: 16px;
    width: 90%;
    max-width: 500px;
    background: #1f2937;
}

#status {
    margin-top: 15px;
    font-size: 18px;
}

#result {
    margin-top: 10px;
    font-size: 22px;
}

button {
    margin-top: 20px;
    padding: 15px 25px;
    font-size: 18px;
    border-radius: 12px;
    border: none;
    background: #ef4444;
    color: white;
    cursor: pointer;
}
</style>
</head>

<body>

<h2>🎤 語音辨識</h2>

<div class="card">
    <div id="targetText"></div>
</div>

<div id="status">請按開始錄音</div>

<div class="card">
    <div id="result"></div>
</div>

<button onclick="start()">🎤 開始錄音</button>

<script>

/* =========================
   取得 target
========================= */
const params = new URLSearchParams(window.location.search);
const target = params.get("target") || "";

/* =========================
   顯示句子
========================= */
window.onload = function(){
    document.getElementById("targetText").innerHTML =
        "<div style='font-size:14px;color:#aaa'>請朗讀：</div>" +
        "<div style='font-size:26px;font-weight:bold'>" + target + "</div>";
};

/* =========================
   Soundex
========================= */
function soundex(s) {
    if (!s) return "";
    const a = s.toLowerCase().split('');
    const f = a.shift();

    const codes = {
        a: '', e: '', i: '', o: '', u: '',
        b: 1, f: 1, p: 1, v: 1,
        c: 2, g: 2, j: 2, k: 2, q: 2, s: 2, x: 2, z: 2,
        d: 3, t: 3,
        l: 4,
        m: 5, n: 5,
        r: 6
    };

    let output = f;
    let prev = codes[f];

    for (let i = 0; i < a.length; i++) {
        let code = codes[a[i]];
        if (code !== prev) {
            if (code !== '') output += code;
        }
        prev = code;
    }

    return (output + "000").slice(0,4);
}

/* =========================
   修正單字
========================= */
function fixSentence(spoken, target){

    let spokenWords = spoken.toLowerCase().split(/\s+/);
    let targetWords = target.toLowerCase().split(/\s+/);

    let fixed = [];

    for(let i=0;i<targetWords.length;i++){

        let s = spokenWords[i] || "";
        let t = targetWords[i];

        if (s === t) {
            fixed.push(t);
        }
        else if (soundex(s) === soundex(t)) {
            fixed.push(t); // ⭐ 修正
        }
        else {
            fixed.push(s);
        }
    }

    return fixed.join(" ");
}

/* =========================
   語音辨識
========================= */
function start(){

    const SpeechRecognition =
        window.SpeechRecognition || window.webkitSpeechRecognition;

    if (!SpeechRecognition) {
        document.getElementById("status").innerText =
            "❌ 不支援語音辨識";
        return;
    }

    let recognition = new SpeechRecognition();
    recognition.lang = "en-US";

    recognition.onstart = function(){
        document.getElementById("status").innerText = "🎤 錄音中...";
    };

    recognition.onresult = function(event){

        let raw = event.results[0][0].transcript;

        // ⭐ 修正
        let fixed = fixSentence(raw, target);

        document.getElementById("result").innerHTML =
            "原始：<br>" + raw +
            "<br><br>修正：<br><b>" + fixed + "</b>";

        document.getElementById("status").innerText = "完成 ✔";

        // ⭐ 回傳修正後
        if (window.opener) {
            window.opener.postMessage({
                spoken: fixed,
                raw: raw,
                target: target
            }, "*");
        }

        setTimeout(()=>{
            window.close();
        }, 800);
    };

    recognition.onerror = function(){
        document.getElementById("status").innerText = "❌ 失敗";
    };

    recognition.start();
}

</script>

</body>
</html>
